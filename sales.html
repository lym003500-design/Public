{% extends "base.html" %}
{% block title %}الفواتير والمبيعات{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-cart-check"></i> إدارة فواتير المبيعات</h2>
    <div class="card mb-4">
        <div class="card-header bg-success text-white">إنشاء فاتورة بيع جديدة</div>
        <div class="card-body">
            <form class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">اسم العميل</label>
                    <input type="text" class="form-control" placeholder="مثال: أحمد محمد علي" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">الصنف المباع</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">الكمية</label>
                    <input type="number" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">سعر البيع الإجمالي</label>
                    <input type="number" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="button" class="btn btn-success" onclick="alert('تم إصدار الفاتورة وتحديث المخزن!')">إصدار الفاتورة</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
