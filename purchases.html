{% extends "base.html" %}
{% block title %}الفواتير والمشتريات{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-cart-plus"></i> إدارة فواتير المشتريات</h2>
    <div class="card mb-4">
        <div class="card-header">تسجيل فاتورة شراء جديدة</div>
        <div class="card-body">
            <form class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">اسم المورد</label>
                    <input type="text" class="form-control" placeholder="مثال: شركة الأمل لتجارة المواد الغذائية" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">اسم الصنف</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">الكمية</label>
                    <input type="number" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">إجمالي الفاتورة</label>
                    <input type="number" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="button" class="btn btn-warning text-dark" onclick="alert('تم حفظ الفاتورة بنجاح!')">حفظ الفاتورة</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
