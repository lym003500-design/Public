{% extends "base.html" %}
{% block title %}إدارة الموردين{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-person-check"></i> دليل الموردين والشركات</h2>
    <div class="card mb-4">
        <div class="card-header">إضافة مورد جديد</div>
        <div class="card-body">
            <form id="supplierForm" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">اسم الشركة / المورد</label>
                    <input type="text" id="supName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">رقم التواصل</label>
                    <input type="text" id="supPhone" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">إضافة المورد</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>كود المورد</th>
                        <th>اسم المورد</th>
                        <th>الهاتف</th>
                    </tr>
                </thead>
                <tbody id="supplierRows"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('supplierForm').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/suppliers', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('supName').value,
                phone: document.getElementById('supPhone').value
            })
        }).then(() => { this.reset(); loadSuppliers(); });
    });

    function loadSuppliers() {
        fetch('/api/suppliers')
            .then(res => res.json())
            .then(data => {
                document.getElementById('supplierRows').innerHTML = data.map(s => `
                    <tr>
                        <td>SUPP-00${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.phone}</td>
                    </tr>
                `).join('');
            });
    }
    loadSuppliers();
</script>
{% endblock %}
