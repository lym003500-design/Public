{% extends "base.html" %}
{% block title %}دفتر الأستاذ{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-journal-text"></i> دفتر الأستاذ العام</h2>
    <div class="card mb-4">
        <div class="card-header">عرض كشف حساب</div>
        <div class="card-body">
            <div class="row g-3 align-items-center">
                <div class="col-md-6">
                    <label class="form-label">اختر الحساب</label>
                    <select id="accountSelect" class="form-select">
                        <option value="">-- اختر الحساب لرؤية حركته --</option>
                        <option value="الخزينة">الخزينة</option>
                        <option value="المبيعات">المبيعات</option>
                        <option value="المشتريات">المشتريات</option>
                    </select>
                </div>
                <div class="col-md-6 text-end mt-4">
                    <button class="btn btn-primary" onclick="generateLedger()">عرض التقرير</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>البيان</th>
                        <th>مدين (+)</th>
                        <th>دائن (-)</th>
                        <th>الرصيد الحالي</th>
                    </tr>
                </thead>
                <tbody id="ledgerRows">
                    <tr><td colspan="5" class="text-center text-muted">اختر حساباً لعرض البيانات</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function generateLedger() {
    const account = document.getElementById('accountSelect').value;
    if(!account) return;
    
    fetch('/api/journal')
        .then(res => res.json())
        .then(entries => {
            const tbody = document.getElementById('ledgerRows');
            let balance = 0;
            let rowsHtml = '';
            
            entries.forEach(e => {
                if(e.debit_account === account || e.credit_account === account) {
                    let debit = e.debit_account === account ? parseFloat(e.amount) : 0;
                    let credit = e.credit_account === account ? parseFloat(e.amount) : 0;
                    balance += (debit - credit);
                    
                    rowsHtml += `
                        <tr>
                            <td>${new Date(e.date).toLocaleDateString('ar-EG')}</td>
                            <td>${e.description}</td>
                            <td class="text-success">${debit || '-'}</td>
                            <td class="text-danger">${credit || '-'}</td>
                            <td><b>${balance} ج.م</b></td>
                        </tr>
                    `;
                }
            });
            tbody.innerHTML = rowsHtml || '<tr><td colspan="5" class="text-center">لا توجد عمليات مسجلة لهذا الحساب</td></tr>';
        });
}
</script>
{% endblock %}
